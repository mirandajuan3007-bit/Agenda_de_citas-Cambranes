<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Error')}"></head>
<body>
<header th:replace="~{layout :: topbar}"></header>
<main class="container">
    <section class="card">
        <h1>Algo salio mal</h1>
        <p th:text="${flashError} ?: 'Ocurrio un error inesperado.'"></p>
        <a class="btn btn-secondary" th:href="@{/}">Volver al inicio</a>
    </section>
</main>
</body>
</html>
