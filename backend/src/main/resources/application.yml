spring:
  application:
    name: agenda-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/agenda_cambranes?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true}
    username: ${DB_USER:agenda}
    password: ${DB_PASSWORD:agenda_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:3000}
  business:
    working-hours:
      start: "09:00"
      end: "17:30"
    max-active-appointments-per-patient: 3
